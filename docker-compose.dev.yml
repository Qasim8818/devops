version: '3.9'

# Development version with hot-reload and debug settings

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devsecops-api-dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - OLLAMA_API_URL=http://ollama:11434
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops
    depends_on:
      - prometheus
      - postgres
      - ollama
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devsecops-dashboard-dev
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - devsecops
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - devsecops
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - devsecops
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: devsecops-db-dev
    environment:
      - POSTGRES_USER=devsecops
      - POSTGRES_PASSWORD=devsecops
      - POSTGRES_DB=devsecops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - devsecops
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - devsecops
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    networks:
      - devsecops
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:
  ollama-data:
  loki-data:

networks:
  devsecops:
    driver: bridge
